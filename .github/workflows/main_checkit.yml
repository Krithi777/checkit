name: Build and deploy Node.js app to Azure Web App - checkit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          CI: false

      - name: Create deployment package
        run: |
          cp package.json build/
          cp package-lock.json build/
          cp server.js build/
          cd build
          npm install --omit=dev

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'checkit'
          slot-name: 'Production'
          package: ./build
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_4C6864D888A44273A80164BDC2E01905 }}
